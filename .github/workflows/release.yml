name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Read Go version from go.mod
        id: get_go_version
        run: |
          ver=$(awk '/^go[[:space:]]+/ {print $2; exit}' go.mod)
          if [ -z "$ver" ]; then
            echo "No 'go' directive found in go.mod" >&2
            exit 1
          fi
          echo "version=$ver" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.get_go_version.outputs.version }}
          cache: true
          cache-dependency-path: go.mod

      - name: Ensure module dependencies
        if: always()
        run: |
          if [ -f go.mod ]; then
            go mod tidy
          fi

      - name: Create output directory
        run: mkdir -p bin

      - name: Build for all platforms
        env:
          CGO_ENABLED: 0
        run: |
          # е®љд№‰ж‰Ђжњ‰з›®ж ‡е№іеЏ°
          platforms=(
            "darwin/amd64"
            "darwin/arm64"
            "linux/amd64"
            "linux/arm64"
            "linux/loong64"
            "windows/386"
            "windows/amd64"
            "windows/arm64"
          )

          for platform in "${platforms[@]}"; do
            GOOS=$(echo $platform | cut -d'/' -f1)
            GOARCH=$(echo $platform | cut -d'/' -f2)
            
            echo "Building for ${GOOS}/${GOARCH}..."
            
            # и®ѕзЅ®иѕ“е‡єж–‡д»¶еђЌ
            output_name="tcping"
            if [ "$GOOS" = "windows" ]; then
              output_name="tcping.exe"
            fi
            
            # зј–иЇ‘
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -trimpath -ldflags="-w -s" -o "$output_name" ./src/main.go
            
            # ж‰“еЊ…ж€ђ zip
            zip_name="tcping-${GOOS}-${GOARCH}.zip"
            zip -j "bin/${zip_name}" "$output_name"
            
            # жё…зђ†зј–иЇ‘дє§з‰©
            rm "$output_name"
            
            echo "Created bin/${zip_name}"
          done

      - name: Generate SHA256SUMS
        run: |
          cd bin
          sha256sum *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: tcping-binaries
          path: bin/*

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, uploading assets..."
            gh release upload "$TAG" bin/*.zip bin/SHA256SUMS.txt --clobber
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" bin/*.zip bin/SHA256SUMS.txt \
              --title "Release $TAG" \
              --notes "Automated release for $TAG"
          fi
